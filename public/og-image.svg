      <stop offset="0.52" stop-color="#0E0B16"/>
      <stop offset="1" stop-color="#07070A"/>
    </linearGradient>
    <radialGradient id="creamGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(282 164) rotate(48) scale(410 320)">
      <stop stop-color="#F3E7C8" stop-opacity="0.28"/>
